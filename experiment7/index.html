<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>React Student App</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      text-align: center;
    }

    .container {
      width: 100%;
    }

    .header h1 {
      color: darkred;
    }

    .student-card {
      border: 2px solid black;
      border-radius: 10px;
      padding: 15px;
      margin: 20px auto;
      width: 300px;
      background-color: white;
      box-shadow: 0px 2px 8px rgba(0,0,0,0.2);
    }

    .student-card h2 {
      color: darkblue;
    }

    .student-card p {
      font-size: 18px;
    }
  </style>

</head>

<body>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

</body>
</html>
